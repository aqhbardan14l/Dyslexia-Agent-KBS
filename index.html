<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dyslexia Support AI Assistant</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main-container">

        <h1>🧠 Dyslexia Support AI Assistant</h1>

        <p>Enter your text and get AI support instantly.</p>

        <!-- INPUT -->
        <textarea id="userInput" placeholder="Type here..."></textarea>

        <!-- BUTTON -->
        <button id="submitBtn">
            Generate Support
        </button>

        <!-- OUTPUT -->
        <div id="outputBox">
            <h3>AI Response</h3>
            <p id="outputText">Waiting for input...</p>
        </div>

    </div>

    <!-- JS FILES -->
    <script src="tools.js"></script>

</body>
</html>
